version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-grass_erp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grass} -d ${POSTGRES_DB:-grass_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-grass}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-grass_erp}?schema=public}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SYSTEM_OWNER_EMAIL: ${SYSTEM_OWNER_EMAIL}
      SYSTEM_OWNER_PASSWORD: ${SYSTEM_OWNER_PASSWORD}
      SYSTEM_OWNER_NAME: ${SYSTEM_OWNER_NAME:-محمد الزرفي}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  pgdata:
